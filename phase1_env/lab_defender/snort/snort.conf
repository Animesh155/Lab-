# ══════════════════════════════════════════════════════════════
#  snort.conf — Module 4 minimal Snort 2.9 config
#
#  Stripped down to the essentials needed for offline PCAP
#  analysis. The shipped Snort 2.9 Ubuntu config (under
#  /etc/snort/) has hundreds of include lines for rule files
#  that don't apply to this lab; we override with just our own
#  local.rules so alerts come exclusively from student-written
#  rules.
#
#  Run with:
#    snort -r /lab/pcaps/attack.pcapng \
#          -c /lab/snort/snort.conf \
#          -A console -q
# ══════════════════════════════════════════════════════════════

# ── Network variables ───────────────────────────────────────
# HOME_NET = the OT subnet where the PLC lives.
ipvar HOME_NET 172.20.10.0/24
ipvar EXTERNAL_NET !$HOME_NET

# Port vars used by Modbus rules
portvar MODBUS_PORTS 502

# ── Decoder defaults ────────────────────────────────────────
# Suppress noisy decoder alerts; we only care about our rules.
config disable_decode_alerts
config disable_tcpopt_experimental_alerts
config disable_tcpopt_obsolete_alerts
config disable_tcpopt_ttcp_alerts
config disable_tcpopt_alerts
config disable_ipopt_alerts

# ── Preprocessors ───────────────────────────────────────────
# The Ubuntu Snort 2.9 package doesn't ship the dynamic Modbus
# preprocessor, so we match the raw Modbus bytes ourselves
# (content / byte_test). This is actually closer to how the
# Module 2 PCAP-first lesson taught students to read the
# protocol — no magic preprocessor, just bytes.
#
# Standard TCP stream reassembly (needed for any TCP rule that
# uses `flow:established`).
preprocessor stream5_global: track_tcp yes, track_udp yes
preprocessor stream5_tcp:    policy linux, ports both 502

# ── Rule paths ──────────────────────────────────────────────
# Only load student-written rules. No system rules — they'd
# generate dozens of unrelated alerts on background SSH/HTTP
# traffic in real captures.
var RULE_PATH /lab/snort
include $RULE_PATH/local.rules

# ── Output ──────────────────────────────────────────────────
output alert_fast: stdout
